
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1人サロン経営タイプ診断｜みずラボ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: #FAFAF8; color: #2D2D2D; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
.wrap { width: 100%; max-width: 480px; }
.header { margin-bottom: 1.5rem; }
.header .sub { font-size: 12px; color: #888780; margin-bottom: 4px; }
.header .title { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700; color: #2D2D2D; margin-bottom: 0.75rem; }
.progress-bar { height: 4px; background: #D3D1C7; border-radius: 2px; margin-bottom: 6px; }
.progress-fill { height: 4px; border-radius: 2px; background: #2D2D2D; transition: width 0.4s ease; }
.progress-label { font-size: 12px; color: #888780; }
.question-box { background: white; border: 0.5px solid #D3D1C7; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; min-height: 90px; display: flex; align-items: center; }
.question-text { font-size: 16px; font-weight: 500; line-height: 1.7; }
.choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }
.choice-btn { background: white; border: 0.5px solid #B4B2A9; border-radius: 8px; padding: 0.9rem 1.1rem; font-size: 15px; font-family: 'Noto Sans JP', sans-serif; color: #2D2D2D; cursor: pointer; text-align: left; transition: all 0.15s; line-height: 1.5; }
.choice-btn:hover { background: #F1EFE8; border-color: #888780; }
.choice-btn.yes { border-left: 3px solid #1D9E75; }
.choice-btn.no { border-left: 3px solid #D85A30; }
.back-btn { font-size: 13px; color: #888780; background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 1rem; font-family: 'Noto Sans JP', sans-serif; }
.back-btn:hover { color: #2D2D2D; }
.result-box { border-radius: 12px; padding: 1.5rem; border: 1px solid; margin-bottom: 1rem; }
.result-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 6px; margin-bottom: 10px; color: white; }
.result-name { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.result-sub { font-size: 13px; margin-bottom: 14px; line-height: 1.6; }
.result-divider { border: none; border-top: 0.5px solid; margin: 14px 0; opacity: 0.25; }
.section-label { font-size: 11px; font-weight: 500; margin-bottom: 6px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.05em; }
.symptom-list { list-style: none; margin-bottom: 14px; }
.symptom-list li { font-size: 13px; padding: 3px 0 3px 16px; position: relative; line-height: 1.6; }
.symptom-list li::before { content: "—"; position: absolute; left: 0; opacity: 0.4; }
.action-pill { display: inline-block; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 6px; color: white; margin-bottom: 0; }
.next-box { background: #2D2D2D; border-radius: 12px; padding: 1.25rem; text-align: center; margin-bottom: 0.75rem; }
.next-box p { color: #F9F6F2; font-size: 13px; line-height: 1.7; margin-bottom: 0.75rem; }
.next-btn { display: inline-block; background: white; color: #2D2D2D; font-size: 14px; font-weight: 500; padding: 0.75rem 1.5rem; border-radius: 8px; text-decoration: none; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; border: none; width: 100%; }
.next-btn:hover { background: #F1EFE8; }
.retry-btn { width: 100%; background: #F1EFE8; border: 0.5px solid #D3D1C7; border-radius: 8px; padding: 0.75rem; font-size: 13px; color: #5F5E5A; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; margin-bottom: 0.75rem; }
.skip-link { display: block; text-align: center; font-size: 12px; color: #B4B2A9; cursor: pointer; background: none; border: none; font-family: 'Noto Sans JP', sans-serif; padding: 0.5rem; }
.skip-link:hover { color: #888780; }
.footer { text-align: center; font-size: 11px; color: #B4B2A9; margin-top: 2rem; }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <p class="sub">みずラボ｜1人サロン経営</p>
    <p class="title">経営タイプ診断</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <p class="progress-label" id="progressLabel">質問 1 / 6</p>
  </div>
  <div id="quizArea"></div>
  <p class="footer">© みずラボ｜1人サロン経営コンサルタント｜@mizurabo_hitoriowner</p>
</div>
<script>
const QUESTIONS = [
  { id:'q1', text:'週5日以上働いているのに、手元にお金が残らない感覚がありますか？', yes:'q2', no:'q4' },
  { id:'q2', text:'休みを取ることに罪悪感を感じることがありますか？', yes:'typeA', no:'q3' },
  { id:'q3', text:'クーポンや値引きを使って集客していますか？', yes:'typeB', no:'typeA' },
  { id:'q4', text:'予約はある程度埋まっている方ですか？', yes:'q5', no:'q6' },
  { id:'q5', text:'売上が一定のラインから伸びない状態が続いていますか？', yes:'typeD', no:'q6' },
  { id:'q6', text:'何から手をつければいいかわからず、行動が先送りになることがありますか？', yes:'typeC', no:'retry' }
];

const TYPES = {
  typeA: {
    label:'タイプA', name:'頑張り屋の消耗型',
    sub:'体力で補っているうちは、限界が天井になる',
    color:'#D85A30', bg:'#FAECE7', tc:'#993C1D',
    symptoms:['週6日以上稼働している','休むと罪悪感がある','売上が変わらないのに疲れが増している','新規を増やすことしか解決策が思い浮かばない'],
    action:'単価設計とリピート構造の構築'
  },
  typeB: {
    label:'タイプB', name:'価格迷子の値下げ型',
    sub:'安くしても埋まらない。その理由に気づいていますか？',
    color:'#BA7517', bg:'#FAEEDA', tc:'#854F0B',
    symptoms:['競合より安く設定している','値上げが怖くて踏み出せない','クーポン・割引で集客している','手元にお金が残らない'],
    action:'ポジショニングと価格の再設計'
  },
  typeC: {
    label:'タイプC', name:'方向音痴の模索型',
    sub:'問題はわかっている。でも何から手をつければいいかわからない',
    color:'#378ADD', bg:'#E6F1FB', tc:'#185FA5',
    symptoms:['インプットしても結果が出ない','何を優先すべきかわからない','SNSを頑張っているが成果が見えない','先送りが続いている'],
    action:'何を・どの順番でやるかを明確にする'
  },
  typeD: {
    label:'タイプD', name:'構造欠如の頭打ち型',
    sub:'予約は埋まっている。なのに豊かさを感じられない',
    color:'#1D9E75', bg:'#E1F5EE', tc:'#0F6E56',
    symptoms:['満席なのに売上が伸びない','これ以上何をすればいいかわからない','施術以外の経営に時間が割けない','このまま5年続けた未来が想像できない'],
    action:'レバレッジポイントを特定する経営構造の見直し'
  }
};

const DETAIL_URL = 'https://mizurabo.github.io/salon2';
let history = [];

function getQIndex(id) { return ['q1','q2','q3','q4','q5','q6'].indexOf(id)+1; }

function showQ(id) {
  if(id==='retry'){ showRetry(); return; }
  if(TYPES[id]){ showResult(id); return; }
  const q = QUESTIONS.find(q=>q.id===id);
  if(!q) return;
  const idx = getQIndex(id);
  document.getElementById('progressFill').style.width = ((idx-1)/6*100)+'%';
  document.getElementById('progressFill').style.background = '#2D2D2D';
  document.getElementById('progressLabel').textContent = '質問 '+idx+' / 6';
  document.getElementById('quizArea').innerHTML = `
    <div class="fade-in">
      ${history.length>0?'<button class="back-btn" onclick="goBack()">← 前の質問に戻る</button>':''}
      <div class="question-box"><p class="question-text">${q.text}</p></div>
      <div class="choices">
        <button class="choice-btn yes" onclick="ans('${id}',true)">✓ &nbsp;はい、当てはまる</button>
        <button class="choice-btn no" onclick="ans('${id}',false)">✗ &nbsp;いいえ、当てはまらない</button>
      </div>
    </div>`;
}

function ans(qId, isYes) {
  const q = QUESTIONS.find(q=>q.id===qId);
  history.push({qId,isYes});
  showQ(isYes?q.yes:q.no);
}

function goBack() {
  if(!history.length) return;
  const last = history.pop();
  showQ(last.qId);
}

function showResult(typeId) {
  const t = TYPES[typeId];
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressFill').style.background = t.color;
  document.getElementById('progressLabel').textContent = '診断完了';

  document.getElementById('quizArea').innerHTML = `
    <div class="fade-in">
      <div class="result-box" style="background:${t.bg};border-color:${t.color}">
        <span class="result-badge" style="background:${t.color}">${t.label}</span>
        <p class="result-name" style="color:${t.tc}">${t.name}</p>
        <p class="result-sub" style="color:${t.tc}">${t.sub}</p>
        <hr class="result-divider" style="border-color:${t.color}">
        <p class="section-label" style="color:${t.tc}">よくある状態</p>
        <ul class="symptom-list" style="color:${t.tc}">${t.symptoms.map(s=>'<li>'+s+'</li>').join('')}</ul>
        <p class="section-label" style="color:${t.tc}">最初にやること</p>
        <span class="action-pill" style="background:${t.color}">${t.action}</span>
      </div>
      <div class="next-box">
        <p>より詳しく自分の状態を確認したい方へ。<br>8問の詳細診断で<br>さらに具体的な原因がわかります。</p>
        <button class="next-btn" onclick="goToDetail()">詳細診断を受ける（無料）</button>
      </div>
      <button class="retry-btn" onclick="restart()">もう一度診断する</button>
      <button class="skip-link" onclick="skipDetail()">今は詳細診断をしない</button>
    </div>`;
}

function goToDetail() {
  window.location.href = DETAIL_URL;
}

function skipDetail() {
  document.getElementById('quizArea').innerHTML = `
    <div class="fade-in">
      <div class="question-box">
        <p class="question-text" style="color:#888780;font-size:14px;">
          診断お疲れ様でした。<br><br>
          気になることがあれば<br>
          いつでもLINEで相談してください。
        </p>
      </div>
      <a href="https://lin.ee/5veCFhV" style="display:block;background:#2D2D2D;color:white;text-align:center;padding:0.85rem;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;margin-bottom:0.75rem;">LINEで相談してみる</a>
      <button class="retry-btn" onclick="restart()">もう一度診断する</button>
    </div>`;
}

function showRetry() {
  document.getElementById('quizArea').innerHTML = `
    <div class="fade-in">
      <div class="question-box"><p class="question-text" style="color:#888780">回答の組み合わせによってタイプを特定できませんでした。最初からもう一度試してみてください。</p></div>
      <button class="retry-btn" onclick="restart()">最初から試す</button>
    </div>`;
}

function restart() {
  history=[];
  showQ('q1');
}

showQ('q1');
</script>
</body>
</html>
